<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><title>Test Juego Online</title></head>
<body style="font-family:monospace;padding:20px;background:#111;color:#0f0;font-size:13px">
<h2>🎮 Test Juego Online</h2>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">
  <button onclick="testComoHost()" style="padding:10px;background:#006;color:white">🔵 SER HOST (J1)</button>
  <button onclick="testComoGuest()" style="padding:10px;background:#600;color:white">🔴 SER GUEST (J2)</button>
  <button onclick="clearAll()" style="padding:10px;background:#333;color:white">🗑 LIMPIAR</button>
</div>
<div id="code" style="font-size:2rem;color:#ff0;margin:10px 0"></div>
<div id="log" style="white-space:pre-line;max-height:60vh;overflow-y:auto"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBd0Vuukdf2UlpzfztvgtF817UrVlsxbcU",
  authDomain:"memoon-f804a.firebaseapp.com",
  databaseURL:"https://memoon-f804a-default-rtdb.firebaseio.com",
  projectId:"memoon-f804a",
});
const db = firebase.database();
let roomCode = null;

function log(msg, color='#0f0'){
  const d=document.getElementById('log');
  const t=new Date().toISOString().substr(11,8);
  d.innerHTML=`<span style="color:${color}">${t} ${msg}\n</span>`+d.innerHTML;
}

async function testComoHost(){
  roomCode = 'TEST';
  log('=== SOY HOST (J1) ===','#fff');
  
  // Crear sala con deck y cards como string
  await db.ref('rooms/TEST').set({
    status:'playing', totalPairs:2,
    deck:'0,1,0,1',  // 2 parejas: imagen 0 y imagen 1
    cp:1, sc0:0, sc1:0, moves:0, matched:0,
    cards:''
  });
  log('✅ Sala creada','#0f0');
  
  // Escuchar cambios
  db.ref('rooms/TEST').on('value', snap=>{
    if(!snap.exists()) return;
    const r = snap.val();
    log('📡 Recibí: cp='+r.cp+' cards="'+r.cards+'" matched='+r.matched, '#ff0');
  });
  
  // Simular voltear carta pos=0 (imagen 0)
  await new Promise(res=>setTimeout(res,1000));
  log('👆 Volteo carta pos=0 id=0','#0ff');
  await db.ref('rooms/TEST/cards').set('0:0:1:1');
  
  // Simular voltear carta pos=2 (también imagen 0 — pareja!)
  await new Promise(res=>setTimeout(res,1000));
  log('👆 Volteo carta pos=2 id=0 (pareja!)','#0ff');
  await db.ref('rooms/TEST/cards').set('0:0:1:1|2:0:1:1');
  
  await new Promise(res=>setTimeout(res,1500));
  log('✅ Marcando pareja','#0f0');
  await db.ref('rooms/TEST').update({
    cards:'0:0:2:1|2:0:2:1',
    sc0:1, matched:1, moves:1, cp:1
  });
  
  log('=== FIN SIMULACIÓN HOST ===','#fff');
}

async function testComoGuest(){
  roomCode = 'TEST';
  log('=== SOY GUEST (J2) — escuchando sala TEST ===','#fff');
  
  db.ref('rooms/TEST').on('value', snap=>{
    if(!snap.exists()){
      log('❌ Sala no existe aún...','#f00');
      return;
    }
    const r = snap.val();
    log('📡 Recibí actualización:','#ff0');
    log('  cp='+r.cp+' moves='+r.moves+' matched='+r.matched,'#ff0');
    log('  cards="'+(r.cards||'(vacío)') +'"','#ff0');
    
    // Parsear cards
    if(r.cards){
      r.cards.split('|').forEach(entry=>{
        const [pos,id,state,by]=entry.split(':');
        log('  carta pos='+pos+' id='+id+' state='+state+' by='+by,'#aaa');
      });
    }
  });
  
  log('Esperando actualizaciones del host...','#aaa');
}

function clearAll(){
  db.ref('rooms/TEST').remove();
  document.getElementById('log').innerHTML='';
  log('Limpiado ✅');
}
</script>
</body>
</html>
