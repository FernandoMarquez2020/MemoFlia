<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memorama Familiar — 2 Jugadores</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --p1: #00cfff;
      --p1g: rgba(0,207,255,0.6);
      --p2: #ff3366;
      --p2g: rgba(255,51,102,0.6);
      --bg: #050510;
      --dim: #8888aa;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 8px 28px;
      position: relative;
      overflow-x: hidden;
      transition: background 0.7s ease;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);
      pointer-events: none; z-index: 999;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,207,255,0.04) 1px,transparent 1px), linear-gradient(90deg,rgba(0,207,255,0.04) 1px,transparent 1px);
      background-size: 44px 44px;
      animation: gs 18s linear infinite; z-index: 0;
    }
    @keyframes gs { 0%{background-position:0 0} 100%{background-position:44px 44px} }

    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 920px; }

    header { text-align: center; margin-bottom: 10px; }
    .game-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.75rem, 2.2vw, 1.2rem);
      color: #fff;
      text-shadow: 0 0 14px var(--p1), 0 0 28px var(--p1);
      letter-spacing: 2px; line-height: 1.9;
    }
    .game-title span { color: var(--p2); text-shadow: 0 0 14px var(--p2), 0 0 28px var(--p2); }

    .players { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }

    .player-card {
      border-radius: 12px; padding: 10px 14px;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      position: relative; overflow: hidden;
      transition: border-color 0.4s, box-shadow 0.4s;
    }
    .player-card.p1 { border-color: rgba(0,207,255,0.25); }
    .player-card.p1.active {
      border-color: var(--p1);
      box-shadow: 0 0 22px var(--p1g), inset 0 0 18px rgba(0,207,255,0.07);
    }
    .player-card.p2 { border-color: rgba(255,51,102,0.25); }
    .player-card.p2.active {
      border-color: var(--p2);
      box-shadow: 0 0 22px var(--p2g), inset 0 0 18px rgba(255,51,102,0.07);
    }
    .player-label {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.45rem, 1.3vw, 0.65rem);
      letter-spacing: 1px; margin-bottom: 4px;
    }
    .p1 .player-label { color: var(--p1); text-shadow: 0 0 8px var(--p1); }
    .p2 .player-label { color: var(--p2); text-shadow: 0 0 8px var(--p2); }
    .player-score { font-size: clamp(1.6rem,4vw,2.4rem); font-weight: 900; line-height: 1; }
    .p1 .player-score { color: var(--p1); text-shadow: 0 0 10px var(--p1); }
    .p2 .player-score { color: var(--p2); text-shadow: 0 0 10px var(--p2); }
    .player-sub { font-size: 0.58rem; color: var(--dim); margin-top: 2px; }
    .turn-arrow {
      font-size: 1rem; position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%); opacity: 0; transition: opacity 0.3s;
    }
    .active .turn-arrow { opacity: 1; animation: blk 0.7s ease-in-out infinite alternate; }
    @keyframes blk { from{opacity:0.3} to{opacity:1} }

    .statsbar { display:flex; justify-content:center; gap:16px; margin-bottom:10px; flex-wrap:wrap; }
    .stat { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:5px 14px; text-align:center; }
    .stat-label { font-size:0.5rem; color:var(--dim); letter-spacing:2px; text-transform:uppercase; }
    .stat-value { font-size:1rem; font-weight:700; color:#fff; }

    .controls { display:flex; justify-content:center; gap:10px; margin-bottom:12px; }
    .btn {
      padding:8px 20px; border-radius:8px; border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.06); color:#fff;
      font-family:'Orbitron',sans-serif; font-size:0.7rem; font-weight:700;
      letter-spacing:2px; cursor:pointer; text-transform:uppercase;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 0 16px rgba(255,255,255,0.15); }

    .grid { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }

    .card {
      aspect-ratio:3/4; position:relative; cursor:pointer;
      transform-style:preserve-3d;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      border-radius:8px;
    }
    .card.flipped  { transform:rotateY(180deg); }
    .card.matched  { transform:rotateY(180deg); cursor:default; }
    .card.wrong    { animation:wsh 0.4s ease; }
    @keyframes wsh {
      0%,100% { transform:rotateY(180deg); }
      25%     { transform:rotateY(180deg) translateX(-5px); }
      75%     { transform:rotateY(180deg) translateX(5px); }
    }
    .card-face { position:absolute; inset:0; border-radius:8px; backface-visibility:hidden; overflow:hidden; }
    .card-back {
      background:linear-gradient(145deg,#080820,#101035);
      border:1.5px solid rgba(0,207,255,0.15);
      display:flex; align-items:center; justify-content:center;
      font-family:'Press Start 2P',monospace;
      font-size:clamp(0.3rem,1vw,0.55rem);
      color:rgba(0,207,255,0.35); text-align:center; line-height:1.7; padding:4px;
    }
    .card-back::after {
      content:''; position:absolute; inset:4px;
      border:1px solid rgba(0,207,255,0.08); border-radius:4px;
      background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,207,255,0.02) 4px,rgba(0,207,255,0.02) 8px);
    }
    .card-front { transform:rotateY(180deg); border:1.5px solid rgba(255,255,255,0.1); }
    .card-front img { width:100%; height:100%; object-fit:cover; display:block; }
    .card.matched.by-p1 .card-front { box-shadow:0 0 12px 2px var(--p1), inset 0 0 0 2px var(--p1); }
    .card.matched.by-p2 .card-front { box-shadow:0 0 12px 2px var(--p2), inset 0 0 0 2px var(--p2); }

    /* overlay */
    .overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.92); z-index:200;
      align-items:center; justify-content:center;
      flex-direction:column; text-align:center; padding:20px;
    }
    .overlay.show { display:flex; }
    .win-emoji { font-size:3.5rem; animation:bnc 0.5s ease infinite alternate; margin-bottom:8px; }
    @keyframes bnc { from{transform:scale(1)} to{transform:scale(1.3)} }
    .win-title {
      font-family:'Press Start 2P',monospace;
      font-size:clamp(1rem,4vw,2rem); letter-spacing:3px; margin-bottom:8px;
      animation:gp 1s ease infinite alternate;
    }
    .win-title.p1w { color:var(--p1); text-shadow:0 0 30px var(--p1); }
    .win-title.p2w { color:var(--p2); text-shadow:0 0 30px var(--p2); }
    .win-title.tie { color:#ffe600; text-shadow:0 0 30px #ffe600; }
    @keyframes gp { from{filter:brightness(0.8)} to{filter:brightness(1.4)} }
    .win-scores { display:flex; gap:30px; justify-content:center; margin:14px 0 16px; }
    .ws { text-align:center; }
    .ws-label { font-size:0.6rem; color:var(--dim); letter-spacing:2px; margin-bottom:4px; }
    .ws-val { font-size:2.2rem; font-weight:900; }
    .ws-val.c1 { color:var(--p1); }
    .ws-val.c2 { color:var(--p2); }
    .win-detail { color:#888; font-size:0.75rem; margin-bottom:22px; }

    @media (max-width:500px) {
      .grid { gap:4px; }
      .players { gap:6px; }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="game-title">MEMO<span>RAMA</span><br>FAMILIAR</div>
  </header>

  <div class="players">
    <div class="player-card p1 active" id="card-p1">
      <div class="player-label">&#9654; JUGADOR 1</div>
      <div class="player-score" id="score-p1">0</div>
      <div class="player-sub">parejas</div>
      <div class="turn-arrow p1" style="color:var(--p1)">&#10148;</div>
    </div>
    <div class="player-card p2" id="card-p2">
      <div class="player-label">JUGADOR 2 &#9654;</div>
      <div class="player-score" id="score-p2">0</div>
      <div class="player-sub">parejas</div>
      <div class="turn-arrow p2" style="color:var(--p2)">&#10148;</div>
    </div>
  </div>

  <div class="statsbar">
    <div class="stat"><div class="stat-label">Movimientos</div><div class="stat-value" id="moves">0</div></div>
    <div class="stat"><div class="stat-label">Tiempo</div><div class="stat-value" id="timer">0:00</div></div>
    <div class="stat"><div class="stat-label">Restantes</div><div class="stat-value" id="remaining">18</div></div>
  </div>

  <div class="controls">
    <button class="btn" onclick="restartGame()">&#8635; NUEVA PARTIDA</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="winOverlay">
  <div class="win-emoji" id="winEmoji">🏆</div>
  <div class="win-title" id="winTitle"></div>
  <div class="win-scores">
    <div class="ws"><div class="ws-label">JUGADOR 1</div><div class="ws-val c1" id="fp1">0</div></div>
    <div class="ws"><div class="ws-label">JUGADOR 2</div><div class="ws-val c2" id="fp2">0</div></div>
  </div>
  <div class="win-detail" id="winDetail"></div>
  <button class="btn" onclick="restartGame()">&#9654; JUGAR DE NUEVO</button>
</div>

let cp=1, scores=[0,0], moves=0, matched=0;
let flipped=[], locked=false;
let secs=0, started=false, tiv=null;

const pad = n => String(n).padStart(2,'0');
const fmt = s => Math.floor(s/60)+':'+pad(s%60);

function startTimer() {
  if(started) return; started=true;
  tiv = setInterval(()=>{ secs++; document.getElementById('timer').textContent=fmt(secs); },1000);
}
function stopTimer() { clearInterval(tiv); }

function setTheme(p) {
  if(p===1) {
    document.body.style.background='linear-gradient(160deg,#020a18 0%,#050510 60%,#020a18 100%)';
    document.getElementById('card-p1').classList.add('active');
    document.getElementById('card-p2').classList.remove('active');
  } else {
    document.body.style.background='linear-gradient(160deg,#180208 0%,#100508 60%,#180208 100%)';
    document.getElementById('card-p2').classList.add('active');
    document.getElementById('card-p1').classList.remove('active');
  }
}

function shuffle(a) {
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

function buildGrid() {
  const grid=document.getElementById('grid'); grid.innerHTML='';
  const deck=shuffle(IMAGES.flatMap((src,i)=>[{src,id:i},{src,id:i}]));
  deck.forEach(item=>{
    const c=document.createElement('div');
    c.className='card'; c.dataset.id=item.id;
    c.innerHTML=`<div class="card-face card-back">MEMO<br>RAMA</div><div class="card-face card-front"><img src="${item.src}" loading="lazy"/></div>`;
    c.addEventListener('click',onCardClick);
    grid.appendChild(c);
  });
}

function onCardClick(e) {
  const c=e.currentTarget;
  if(locked||c.classList.contains('flipped')||c.classList.contains('matched')) return;
  startTimer();
  c.classList.add('flipped');
  flipped.push(c);
  if(flipped.length===2){ locked=true; moves++; document.getElementById('moves').textContent=moves; checkMatch(); }
}

function checkMatch() {
  const [a,b]=flipped;
  if(a.dataset.id===b.dataset.id) {
    const cls='by-p'+cp;
    setTimeout(()=>{
      a.classList.add('matched',cls); b.classList.add('matched',cls);
      scores[cp-1]++; matched++;
      document.getElementById('score-p'+cp).textContent=scores[cp-1];
      document.getElementById('remaining').textContent=18-matched;
      flipped=[]; locked=false;
      if(matched===18) setTimeout(showWin,500);
    },300);
  } else {
    a.classList.add('wrong'); b.classList.add('wrong');
    setTimeout(()=>{
      a.classList.remove('flipped','wrong'); b.classList.remove('flipped','wrong');
      flipped=[]; locked=false;
      cp = cp===1?2:1;
      setTheme(cp);
    },950);
  }
}

function showWin() {
  stopTimer();
  const s1=scores[0], s2=scores[1];
  document.getElementById('fp1').textContent=s1;
  document.getElementById('fp2').textContent=s2;
  document.getElementById('winDetail').textContent=`Tiempo: ${fmt(secs)} · Movimientos: ${moves}`;
  const t=document.getElementById('winTitle');
  const em=document.getElementById('winEmoji');
  if(s1>s2){ t.textContent='¡JUGADOR 1 GANA!'; t.className='win-title p1w'; em.textContent='🏆'; }
  else if(s2>s1){ t.textContent='¡JUGADOR 2 GANA!'; t.className='win-title p2w'; em.textContent='🏆'; }
  else{ t.textContent='¡EMPATE!'; t.className='win-title tie'; em.textContent='🤝'; }
  document.getElementById('winOverlay').classList.add('show');
}

function restartGame() {
  stopTimer();
  scores=[0,0]; moves=0; matched=0; secs=0; started=false; flipped=[]; locked=false; cp=1;
  document.getElementById('score-p1').textContent='0';
  document.getElementById('score-p2').textContent='0';
  document.getElementById('moves').textContent='0';
  document.getElementById('timer').textContent='0:00';
  document.getElementById('remaining').textContent='18';
  document.getElementById('winOverlay').classList.remove('show');
  setTheme(1);
  buildGrid();
}

setTheme(1);
buildGrid();
